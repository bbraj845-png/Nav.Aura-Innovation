<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Transform chaotic businesses into scalable brands with a tech-driven ecosystem that integrates systems, automation, and operational optimization."
    />
    <title>Nav.Aura Innovation — Systems That Scale</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <form name="enquiry" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="enquiry" />
      <input name="bot-field" type="text" />
      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="phone" type="tel" />
      <input name="business" type="text" />
      <select name="revenue">
        <option value="0-50k">0-50k</option>
        <option value="50k-2L">50k-2L</option>
        <option value="2L-10L">2L-10L</option>
        <option value="10L-50L">10L-50L</option>
        <option value="50L-1Cr">50L-1Cr</option>
        <option value="1Cr+">1Cr+</option>
      </select>
      <textarea name="message"></textarea>
      <input name="industry" type="text" />
      <input name="goal" type="text" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
